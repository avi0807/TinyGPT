
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: avi
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: tiny_gpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avi -d tiny_gpt"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://avi:yourpassword@db:5432/tiny_gpt

volumes:
  pgdata:
